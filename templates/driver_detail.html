{% extends "base.html" %}

{% block title %}{{ driver["Driver"] }} - Driver Detail{% endblock %}

{% block content %}
    <div class="driver-detail">
        <section class="page-header">
            <h1>{{ driver["Driver"] }}</h1>
            <p>Nationality: {{ driver["Nationality"] }}</p>
            <p>Seasons: {{ driver["Seasons"] | join(", ") }}</p>
        </section>
    </div>
{% endblock %}
